services:
  victoriametrics:
    container_name: !reset null
    restart: !reset null
    mem_limit: !reset null
    memswap_limit: !reset null
    ports: !reset []
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m
      placement:
        constraints:
          - node.labels.app_zone == manager
