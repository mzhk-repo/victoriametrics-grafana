services:
  blackbox-exporter:
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
      - --web.listen-address=:9115
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    image: quay.io/prometheus/blackbox-exporter:v0.27.0
    networks:
      monitoring_net: null
    volumes:
      - type: bind
        source: /opt/victoriametrics-grafana/blackbox/blackbox.yml
        target: /etc/blackbox_exporter/config.yml
        read_only: true
        bind: {}
  cadvisor:
    command:
      - --port=8081
      - --housekeeping_interval=10s
      - --docker_only=true
      - --store_container_labels=true
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    environment:
      CADVISOR_HEALTHCHECK_URL: http://localhost:8081/healthz
    image: ghcr.io/google/cadvisor@sha256:e02855207ec07bb45ee41f720645945251f093f24c28f8c29cf718490f784922
    networks:
      monitoring_net: null
    volumes:
      - type: bind
        source: /
        target: /rootfs
        read_only: true
        bind: {}
      - type: bind
        source: /var/run
        target: /var/run
        read_only: true
        bind: {}
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
        bind: {}
      - type: bind
        source: /sys
        target: /sys
        read_only: true
        bind: {}
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
        read_only: true
        bind: {}
      - type: bind
        source: /dev/disk
        target: /dev/disk
        read_only: true
        bind: {}
  grafana:
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ -f /run/secrets/grafana_admin_password ]; then
          export GF_SECURITY_ADMIN_PASSWORD="$$(cat /run/secrets/grafana_admin_password)"
        fi
        if [ -f /run/secrets/grafana_smtp_password ]; then
          export GF_SMTP_PASSWORD="$$(cat /run/secrets/grafana_smtp_password)"
        fi
        exec /run.sh
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SMTP_ENABLED: "false"
      GF_SMTP_FROM_ADDRESS: alerts@ldubgd.edu.ua
      GF_SMTP_FROM_NAME: KDI Monitoring
      GF_SMTP_HOST: smtp.office365.com:587
      GF_SMTP_USER: alerts@ldubgd.edu.ua
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      MS365_ALERT_EMAIL_TO: m.zhuk@ldubgd.edu.ua,b.filipchuk@ldubgd.edu.ua
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      VM_DATASOURCE_URL: http://victoriametrics:8428
    image: grafana/grafana@sha256:29a23aeee4b890e1c2f4372a78e1fee768d3f437059b1748c07076213bb1eec4
    labels:
      traefik.docker.network: proxy-net
      traefik.enable: "true"
      traefik.http.routers.grafana.entrypoints: web
      traefik.http.routers.grafana.rule: Host(`grafana.pinokew.buzz`)
      traefik.http.routers.grafana.service: grafana
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
    networks:
      monitoring_net: null
      proxy-net: null
    secrets:
      - source: grafana_admin_password
        target: grafana_admin_password
      - source: grafana_smtp_password
        target: grafana_smtp_password
    user: "0"
    volumes:
      - type: bind
        source: /srv/victoriametrics-grafana/.data/grafana
        target: /var/lib/grafana
        bind: {}
      - type: bind
        source: /srv/victoriametrics-grafana/.data/grafana-logs
        target: /var/log/grafana
        bind: {}
      - type: bind
        source: /opt/victoriametrics-grafana/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
        bind: {}
      - type: bind
        source: /opt/victoriametrics-grafana/grafana/dashboards
        target: /var/lib/grafana/dashboards
        read_only: true
        bind: {}
  mariadb-exporter:
    command:
      - --mysqld.address=db:3306
      - --mysqld.username=metrics_reader
      - --web.listen-address=:9104
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export MYSQLD_EXPORTER_PASSWORD="$$(cat /run/secrets/mariadb_exporter_password)"
        exec /bin/mysqld_exporter "$$@"
      - --
    image: prom/mysqld-exporter@sha256:2598c0571f383708e19016d119bb45c06128a9ebc962c9f49483278ac5a94c41
    networks:
      kohanet: null
      monitoring_net: null
    secrets:
      - source: mariadb_exporter_password
        target: mariadb_exporter_password
  matomo-mariadb-exporter:
    command:
      - --mysqld.address=matomo-db:3306
      - --mysqld.username=metrics_reader
      - --web.listen-address=:9104
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export MYSQLD_EXPORTER_PASSWORD="$$(cat /run/secrets/matomo_mariadb_exporter_password)"
        exec /bin/mysqld_exporter "$$@"
      - --
    image: prom/mysqld-exporter@sha256:2598c0571f383708e19016d119bb45c06128a9ebc962c9f49483278ac5a94c41
    networks:
      matomonet: null
      monitoring_net: null
    secrets:
      - source: matomo_mariadb_exporter_password
        target: matomo_mariadb_exporter_password
  node-exporter:
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.textfile.directory=/vm-textfile-metrics
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|run($$|/.*)|sys|var/lib/docker($$|/.*)|var/lib/containers/storage($$|/.*))
      - --web.listen-address=:9100
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    image: quay.io/prometheus/node-exporter@sha256:798c5c6d60ea017af51ec1b74d1bb378639237de32c0d2e34b771bab5deefab3
    networks:
      monitoring_net: null
    volumes:
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
        bind: {}
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
        bind: {}
      - type: bind
        source: /run/udev
        target: /run/udev
        read_only: true
        bind: {}
      - type: bind
        source: /srv/victoriametrics-grafana/.data/node-exporter-textfile
        target: /vm-textfile-metrics
        read_only: true
        bind: {}
  postgres-exporter:
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    environment:
      DATA_SOURCE_NAME: postgresql://metrics_reader:877e9fa84a8c8262ec3d263e@dspacedb:5432/dspace?sslmode=disable
    image: prometheuscommunity/postgres-exporter@sha256:e8a170b85eab07c75c2b0f3aa2806be5c2fe5bba46fd0336914e1f36572cde08
    networks:
      dspacenet: null
      monitoring_net: null
  victoriametrics:
    command:
      - --storageDataPath=/storage
      - --retentionPeriod=90d
      - --promscrape.config=/etc/vm/scrape-config.yml
      - --httpListenAddr=:8428
      - --maxLabelsPerTimeseries=100
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m0s
      placement:
        constraints:
          - node.labels.app_zone == manager
    image: victoriametrics/victoria-metrics@sha256:15a3261e4776a47eb275755d30101b326bf8c3cc330998f80bdd3eb359618b10
    networks:
      monitoring_net: null
      proxy-net: null
    volumes:
      - type: bind
        source: /srv/victoriametrics-grafana/.data/victoriametrics
        target: /storage
        bind: {}
      - type: bind
        source: /opt/victoriametrics-grafana/victoria-metrics/scrape-config.yml
        target: /etc/vm/scrape-config.yml
        read_only: true
        bind: {}
networks:
  dspacenet:
    name: dspacenet
    external: true
  kohanet:
    name: koha-deploy_kohanet
    external: true
  matomonet:
    name: matomo-analytics_matomonet
    external: true
  monitoring_net:
    name: monitoring_net
    driver: overlay
  proxy-net:
    name: proxy-net
    external: true
secrets:
  grafana_admin_password:
    name: monitoring_grafana_admin_password_dev_v1
    external: true
  grafana_smtp_password:
    name: monitoring_ms365_smtp_password_dev_v1
    external: true
  mariadb_exporter_password:
    name: monitoring_mariadb_exporter_password_dev_v1
    external: true
  matomo_mariadb_exporter_password:
    name: monitoring_matomo_mariadb_exporter_password_dev_v1
    external: true
